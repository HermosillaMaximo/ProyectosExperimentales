<!doctype html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>RelojesDataVIP</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet" />
	<style>
		@font-face {
			font-display: swap;
			font-family: "Tissot Sans";
			font-style: normal;
			font-weight: 400;
			src: local("Tissot Sans"), local("Arial");
		}

		:root {
			--fontRegular: "Tissot Sans", Arial, sans-serif;
			--bg-a: #060708;
			--bg-b: #0f1115;
			--bg-c: #1a1c20;
			--ink: #f2efe6;
			--ink-soft: #beb39b;
			--panel: rgba(12, 13, 16, 0.78);
			--panel-border: rgba(214, 186, 118, 0.36);
			--accent: #d6ba76;
			--accent-2: #c9a45a;
			--ok: #c4a669;
			--shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
			--radius: 22px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: var(--fontRegular);
			font-weight: 400;
			color: var(--ink);
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
			text-rendering: geometricPrecision;
			background:
				radial-gradient(circle at 10% 7%, rgba(214, 186, 118, 0.14), transparent 26%),
				radial-gradient(circle at 82% 90%, rgba(214, 186, 118, 0.1), transparent 30%),
				linear-gradient(145deg, var(--bg-a) 0%, var(--bg-b) 46%, var(--bg-c) 100%);
			overflow-x: hidden;
			position: relative;
		}

		.background-watches {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 0;
			overflow: hidden;
		}

		.watch-fragment {
			position: absolute;
			width: 460px;
			height: 460px;
			border-radius: 999px;
			overflow: hidden;
			opacity: 0.72;
			border: 1px solid rgba(214, 186, 118, 0.26);
			box-shadow:
				0 0 0 1px rgba(214, 186, 118, 0.12),
				0 12px 40px rgba(0, 0, 0, 0.4);
			filter: saturate(0.9) contrast(1.02);
		}

		.watch-fragment img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			filter: grayscale(0.35) sepia(0.28) brightness(0.58) contrast(1.18);
		}

		.watch-fragment::after {
			content: "";
			position: absolute;
			inset: 0;
			background:
				radial-gradient(circle at 52% 50%, rgba(0, 0, 0, 0) 38%, rgba(0, 0, 0, 0.28) 64%, rgba(0, 0, 0, 0.56) 100%),
				linear-gradient(145deg, rgba(214, 186, 118, 0.22), rgba(0, 0, 0, 0.22));
		}

		.left-top {
			left: -310px;
			top: 8%;
			transform: rotate(-14deg);
			clip-path: ellipse(62% 66% at 78% 52%);
		}

		.left-top img {
			object-position: 38% 44%;
		}

		.left-bottom {
			left: -300px;
			bottom: -38px;
			transform: rotate(10deg) scale(0.88);
			opacity: 0.6;
			clip-path: ellipse(64% 62% at 80% 48%);
		}

		.left-bottom img {
			object-position: 30% 60%;
		}

		.right-mid {
			right: -300px;
			top: 34%;
			transform: rotate(14deg);
			clip-path: ellipse(62% 68% at 22% 50%);
		}

		.right-mid img {
			object-position: 64% 48%;
		}

		.right-top {
			right: -260px;
			top: -90px;
			transform: rotate(-8deg) scale(0.8);
			opacity: 0.52;
			clip-path: ellipse(66% 64% at 24% 56%);
		}

		.right-top img {
			object-position: 58% 40%;
		}

		.right-touch {
			width: 500px;
			height: 500px;
			right: -255px;
			top: 40%;
			transform: rotate(8deg) scale(0.92);
			opacity: 0.78;
			clip-path: ellipse(68% 68% at 22% 50%);
			border-color: rgba(170, 170, 170, 0.3);
			box-shadow:
				0 0 0 1px rgba(180, 180, 180, 0.12),
				0 18px 46px rgba(0, 0, 0, 0.52);
		}

		.right-touch img {
			object-position: 74% 52%;
			filter: grayscale(0.62) sepia(0.08) brightness(0.44) contrast(1.32);
		}

		.right-touch::after {
			background:
				radial-gradient(circle at 44% 50%, rgba(0, 0, 0, 0) 34%, rgba(0, 0, 0, 0.34) 62%, rgba(0, 0, 0, 0.68) 100%),
				linear-gradient(145deg, rgba(45, 45, 48, 0.22), rgba(0, 0, 0, 0.28));
		}

		.site-header {
			width: min(1100px, 92vw);
			margin: 24px auto 0;
			background: linear-gradient(110deg, rgba(10, 11, 14, 0.9), rgba(16, 18, 23, 0.82));
			border: 1px solid var(--panel-border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			backdrop-filter: blur(8px);
			animation: riseIn 700ms ease-out both;
			position: relative;
			z-index: 2;
		}

		.site-header-inner {
			display: grid;
			grid-template-columns: auto 1fr auto;
			align-items: center;
			gap: 16px;
			padding: 14px 16px;
		}

		.icon-button,
		.btn-rdvip {
			border: 1px solid var(--panel-border);
			background: linear-gradient(135deg, rgba(19, 20, 24, 0.95), rgba(36, 32, 25, 0.88));
			color: var(--ink);
			border-radius: 12px;
			padding: 10px 13px;
			font-family: var(--fontRegular);
			font-weight: 600;
			font-size: 0.9rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			text-decoration: none;
			cursor: pointer;
			transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
		}

		.icon-button {
			font-size: 1.08rem;
			line-height: 1;
			padding: 12px 14px;
			border-radius: 999px;
		}

		.btn-rdvip {
			padding: 13px 34px;
			font-size: 1.06rem;
			font-weight: 700;
			border-radius: 999px;
			box-shadow: inset 0 0 0 1px rgba(214, 186, 118, 0.22);
		}

		.icon-button:hover,
		.btn-rdvip:hover {
			transform: translateY(-1px);
			box-shadow: 0 12px 24px rgba(0, 0, 0, 0.38);
			border-color: rgba(214, 186, 118, 0.64);
		}

		.header-title {
			font-family: var(--fontRegular);
			font-size: clamp(1.4rem, 3.1vw, 2.1rem);
			line-height: 1;
			letter-spacing: 0.14em;
			text-align: center;
			text-transform: uppercase;
			text-shadow: 0 0 24px rgba(214, 186, 118, 0.14);
			justify-self: center;
		}

		.header-left,
		.header-right {
			display: inline-flex;
			align-items: center;
		}

		.header-left {
			justify-self: start;
		}

		.header-right {
			justify-self: end;
		}

		.container {
			width: min(1100px, 92vw);
			margin: 0 auto;
			padding: 24px 0 34px;
			display: grid;
			gap: 24px;
			position: relative;
			z-index: 2;
		}

		.main-clock {
			background: linear-gradient(125deg, rgba(14, 16, 20, 0.92), rgba(30, 26, 19, 0.9));
			border: 1px solid var(--panel-border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 24px;
			display: grid;
			gap: 12px;
			animation: riseIn 850ms ease-out both;
			animation-delay: 90ms;
		}

		.main-clock-title {
			text-transform: uppercase;
			letter-spacing: 0.14em;
			font-size: 0.9rem;
			color: var(--accent);
			font-weight: 700;
			font-family: "Cinzel", serif;
		}

		.main-time {
			font-family: "Cinzel", serif;
			font-size: clamp(2.3rem, 7vw, 5.2rem);
			line-height: 0.92;
			letter-spacing: 0.01em;
		}

		.main-date {
			color: var(--ink-soft);
			font-weight: 600;
			font-size: clamp(0.96rem, 2vw, 1.08rem);
			letter-spacing: 0.03em;
		}

		.grid {
			display: grid;
			gap: 14px;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
		}

		.clock-card {
			background: var(--panel);
			border: 1px solid var(--panel-border);
			border-radius: 18px;
			box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
			padding: 18px;
			display: grid;
			gap: 6px;
			transform: translateY(14px);
			opacity: 0;
			animation: cardIn 600ms ease-out forwards;
		}

		.clock-card:nth-child(1) { animation-delay: 140ms; }
		.clock-card:nth-child(2) { animation-delay: 220ms; }
		.clock-card:nth-child(3) { animation-delay: 300ms; }
		.clock-card:nth-child(4) { animation-delay: 380ms; }

		.city {
			font-weight: 700;
			font-size: 1.22rem;
			font-family: "Cinzel", serif;
			letter-spacing: 0.03em;
		}

		.zone {
			font-size: 0.8rem;
			color: var(--ink-soft);
			text-transform: uppercase;
			letter-spacing: 0.12em;
		}

		.time {
			font-family: "Cinzel", serif;
			font-size: 2.2rem;
			letter-spacing: 0.03em;
		}

		.status {
			color: var(--ok);
			font-size: 0.92rem;
			font-weight: 600;
			letter-spacing: 0.03em;
		}

		.footer-note {
			color: var(--ink-soft);
			font-size: 1.02rem;
			text-align: center;
			margin-top: 8px;
			letter-spacing: 0.02em;
		}

		@keyframes riseIn {
			from {
				transform: translateY(20px);
				opacity: 0;
			}
			to {
				transform: translateY(0);
				opacity: 1;
			}
		}

		@keyframes cardIn {
			to {
				transform: translateY(0);
				opacity: 1;
			}
		}

		@media (max-width: 640px) {
			.site-header,
			.main-clock,
			.clock-card {
				border-radius: 16px;
			}

			.site-header-inner {
				grid-template-columns: 1fr auto;
				grid-template-areas:
					"brand brand"
					"left right";
				justify-items: center;
				gap: 12px;
			}

			.header-title {
				grid-area: brand;
				padding-right: 0;
			}

			.header-left {
				grid-area: left;
				justify-self: start;
			}

			.header-right {
				grid-area: right;
				justify-self: end;
			}

			.container {
				padding-top: 16px;
			}

			.watch-fragment {
				width: 300px;
				height: 300px;
			}

			.left-top {
				left: -205px;
			}

			.left-bottom {
				left: -190px;
			}

			.right-mid {
				right: -200px;
			}

			.right-top {
				right: -170px;
				top: -70px;
			}

			.right-touch {
				width: 340px;
				height: 340px;
				right: -150px;
				top: 55%;
			}
		}
	</style>
</head>
<body>
	<div class="background-watches" aria-hidden="true">
		<div class="watch-fragment left-top">
			<img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&w=900&q=80" alt="" loading="lazy" referrerpolicy="no-referrer" />
		</div>
		<div class="watch-fragment left-bottom">
			<img src="https://images.unsplash.com/photo-1612817159949-195b6eb9e31a?auto=format&fit=crop&w=900&q=80" alt="" loading="lazy" referrerpolicy="no-referrer" />
		</div>
		<div class="watch-fragment right-mid">
			<img src="https://images.unsplash.com/photo-1548171915-e26c7726b9f0?auto=format&fit=crop&w=900&q=80" alt="" loading="lazy" referrerpolicy="no-referrer" />
		</div>
		<div class="watch-fragment right-top">
			<img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?auto=format&fit=crop&w=900&q=80" alt="" loading="lazy" referrerpolicy="no-referrer" />
		</div>
		<div class="watch-fragment right-touch">
			<img src="https://images.unsplash.com/photo-1619134778706-7015533a6150?auto=format&fit=crop&w=900&q=80" alt="" loading="lazy" referrerpolicy="no-referrer" />
		</div>
	</div>

	<header class="site-header">
		<div class="site-header-inner">
			<div class="header-left">
				<a class="btn-rdvip" href="#mainContent">RDVIP</a>
			</div>
			<h1 class="header-title">RelojesDataVIP</h1>
			<div class="header-right">
				<button class="icon-button" type="button" aria-label="Buscar">🔍</button>
			</div>
		</div>
	</header>

	<main class="container" id="mainContent">
		<section class="main-clock" aria-live="polite">
			<p class="main-clock-title">Hora local</p>
			<p class="main-time" id="localTime">--:--:--</p>
			<p class="main-date" id="localDate">Cargando fecha...</p>
		</section>

		<section class="grid" id="worldClockGrid">
			<article class="clock-card" data-timezone="America/New_York" data-label="Estados Unidos">
				<p class="city">Estados Unidos</p>
				<p class="zone">America/New_York</p>
				<p class="time">--:--</p>
				<p class="status">Actualizando...</p>
			</article>

			<article class="clock-card" data-timezone="Europe/Berlin" data-label="Alemania">
				<p class="city">Alemania</p>
				<p class="zone">Europe/Berlin</p>
				<p class="time">--:--</p>
				<p class="status">Actualizando...</p>
			</article>

			<article class="clock-card" data-timezone="Asia/Tokyo" data-label="Tokyo">
				<p class="city">Tokyo</p>
				<p class="zone">Asia/Tokyo</p>
				<p class="time">--:--</p>
				<p class="status">Actualizando...</p>
			</article>

		

		</section>

		
	</main>

	<script>
		const localTime = document.getElementById("localTime");
		const localDate = document.getElementById("localDate");
		const cards = Array.from(document.querySelectorAll(".clock-card"));

		const localTimeFormatter = new Intl.DateTimeFormat("es-ES", {
			hour: "2-digit",
			minute: "2-digit",
			second: "2-digit",
			hour12: false
		});

		const localDateFormatter = new Intl.DateTimeFormat("es-ES", {
			weekday: "long",
			day: "2-digit",
			month: "long",
			year: "numeric"
		});

		function getStatusMessage(hour) {
			if (hour >= 6 && hour < 12) return "Manana activa";
			if (hour >= 12 && hour < 20) return "Tarde en curso";
			return "Noche tranquila";
		}

		function updateClocks() {
			const now = new Date();
			localTime.textContent = localTimeFormatter.format(now);
			localDate.textContent = localDateFormatter.format(now);

			cards.forEach((card) => {
				const timezone = card.dataset.timezone;
				const timeElement = card.querySelector(".time");
				const statusElement = card.querySelector(".status");

				const parts = new Intl.DateTimeFormat("es-ES", {
					hour: "2-digit",
					minute: "2-digit",
					hour12: false,
					timeZone: timezone
				}).formatToParts(now);

				const hourPart = parts.find((part) => part.type === "hour");
				const minutePart = parts.find((part) => part.type === "minute");

				const hour = Number(hourPart ? hourPart.value : "0");
				const minute = minutePart ? minutePart.value : "00";

				timeElement.textContent = `${String(hour).padStart(2, "0")}:${minute}`;
				statusElement.textContent = getStatusMessage(hour);
			});
		}

		updateClocks();
		setInterval(updateClocks, 1000);
	</script>
</body>
</html>
